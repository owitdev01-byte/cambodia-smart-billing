services:
  postgres:
    image: postgres:16
    container_name: csb-postgres
    env_file: ../.env
    environment:
      POSTGRES_DB: postgres
    volumes:
      - csb-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  odoo:
    image: odoo:19
    container_name: csb-odoo
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8169:8069"
    env_file: ../.env
    environment:
      HOST: postgres
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        grep -v -E '^[[:space:]]*admin_passwd[[:space:]]*=' /etc/odoo/odoo.conf > /tmp/odoo.conf.filtered
        cat /tmp/odoo.conf.filtered > /etc/odoo/odoo.conf
        printf '\nadmin_passwd = %s\n' "$${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}" >> /etc/odoo/odoo.conf
        exec /entrypoint.sh odoo
    volumes:
      - csb-odoo-data:/var/lib/odoo
      - ../addons:/mnt/extra-addons
    restart: unless-stopped

volumes:
  csb-db-data:
  csb-odoo-data:
